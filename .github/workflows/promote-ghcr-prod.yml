name: Promote GHCR image to prod

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Source tag to promote (e.g. main or sha-abc123)"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/peter-weyland007/weismantracker

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Promote source tag to prod
        run: |
          docker buildx imagetools create \
            -t ${IMAGE}:prod \
            ${IMAGE}:${{ inputs.source_tag }}

      - name: Verify prod tag
        run: docker buildx imagetools inspect ${IMAGE}:prod
